name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not include Telegram tokens, Codex credentials, personal data, or files from `runtime/`.
        Report security vulnerabilities privately according to `SECURITY.md`.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest sequence that reproduces the problem.
      placeholder: |
        1. Run ...
        2. Send ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or git commit SHA
    validations:
      required: true
  - type: dropdown
    id: python
    attributes:
      label: Python version
      options:
        - "3.11"
        - "3.12"
        - Other
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized diagnostics
      description: Paste relevant `doctor` output or logs after removing IDs, paths, and secrets.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Safety check
      options:
        - label: I removed tokens, credentials, personal data, and private local paths.
          required: true
        - label: This is not a security vulnerability.
          required: true
