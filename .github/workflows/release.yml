name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Check out signed tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify GitHub signature
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          object="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq '.object')"
          test "$(jq -r '.type' <<<"${object}")" = "tag"
          sha="$(jq -r '.sha' <<<"${object}")"
          test "$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${sha}" --jq '.verification.verified')" = "true"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate version and release files
        run: python scripts/release_check.py --tag "${GITHUB_REF_NAME}"

      - name: Run offline tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

      - name: Build packages
        run: python -m pip install build && python -m build

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --verify-tag --generate-notes
