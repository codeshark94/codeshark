# `python3 -m codex_codeshark setup` creates config.local.toml.
allowed_user_ids = [123456789]
workdir = "/Users/yourname/workspace/Codex-codeshark/workspace"
codex_binary = "/Applications/Codex.app/Contents/Resources/codex"
codex_profile = "codex-codeshark"
routine_model = "gpt-5.6-luna"
routine_reasoning_effort = "medium"
primary_model = "gpt-5.6-sol"
primary_reasoning_effort = "high"
rework_model = "gpt-5.6-sol"
rework_reasoning_effort = "high"
validator_model = "gpt-5.6-terra"
validator_reasoning_effort = "high"
feedback_model = "gpt-5.6-terra"
feedback_reasoning_effort = "high"
triage_model = "gpt-5.6-luna"
triage_reasoning_effort = "medium"
preflight_model = "gpt-5.6-luna" # planning
preflight_reasoning_effort = "low"
research_model = "gpt-5.6-luna"
research_reasoning_effort = "medium"
finalizer_model = "gpt-5.6-sol"
finalizer_reasoning_effort = "medium"

# Five general orchestration tiers. Planning, research, rework loops, and
# finalization require independent review; adversarial review requires a rework loop.
quick_uses_preflight = false
quick_uses_research = false
quick_uses_validator = false
quick_feedback_iterations = 0
quick_uses_finalizer = false
quick_uses_adversarial_review = false
routine_uses_preflight = false
routine_uses_research = false
routine_uses_validator = false
routine_feedback_iterations = 0
routine_uses_finalizer = false
routine_uses_adversarial_review = false
standard_uses_preflight = false
standard_uses_research = false
standard_uses_validator = true
standard_feedback_iterations = 0
standard_uses_finalizer = true
standard_uses_adversarial_review = false
deep_uses_preflight = true
deep_uses_research = false
deep_uses_validator = true
deep_feedback_iterations = 1
deep_uses_finalizer = true
deep_uses_adversarial_review = true
high_assurance_uses_preflight = true
high_assurance_uses_research = true
high_assurance_uses_validator = true
high_assurance_feedback_iterations = 2
high_assurance_uses_finalizer = true
high_assurance_uses_adversarial_review = true
poll_timeout_seconds = 30
# 0 disables the per-phase task timeout. `/cancel` remains available.
task_timeout_seconds = 0
queue_size = 20
# Choose the local task concurrency that matches this Mac. Persistent sessions in
# the same chat remain serialized so their conversational context cannot race.
worker_count = 8
max_session_turns = 120
# Telegram, local, and group temporary contexts stay separate and expire after
# this many idle days. Project long-term memories and delivered artifacts remain shared.
temporary_context_retention_days = 14
memory_max_chars = 12000
codex_network_access = false
# Set true only for a paired administrator who intentionally wants unrestricted
# local Codex access, including file creation and `codex plugin` installation.
# In an enabled group, the paired administrator retains these capabilities. Other
# members remain confined to the separate group sandbox with MCP disabled.
admin_full_access = false
# Administrator-only controls. These apply in private chat and administrator-enabled
# groups; normal members never inherit them.
admin_auto_approve_actions = false
admin_mcp_enabled = true
admin_delegated_write_access = true
# Non-administrator group controls. Requests must still directly address Codeshark
# and stay in the server-controlled group sandbox with MCP disabled.
group_auto_enable_on_admin_address = false
group_member_requests_enabled = true
group_auto_register_members = false
group_require_registered_members = false
group_respond_to_mentions = true
group_respond_to_bot_replies = true
group_respond_to_addressed_threads = true
group_network_access = true
group_workspace_write = true
attachment_max_bytes = 10000000
# Private administrator tasks may inspect, but never write, under these server-controlled roots.
# Non-administrator group tasks cannot see these paths.
read_only_roots = []
# Administrator tasks may develop projects under these roots. Destructive or external actions
# still pass through the approval gate. Non-administrator group tasks cannot see these paths.
delegated_roots = ["/Users/yourname/workspace"]

# Every MCP server configured in the Codex global/profile config must be named here.
# Servers omitted from allowed_tools are disabled for this gateway.
[mcp_policy]
known_servers = []

[mcp_policy.allowed_tools]
# github = ["list_issues", "get_issue"]
